<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

/* ===== BODY ===== */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#e0e7ff,#f8fbff);
}

/* ===== CARD ===== */
.card{
    background:white;
    padding:40px 35px;
    width:350px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,0.15);
    animation:fadeIn 0.5s ease;
}

/* ===== TITLE ===== */
.card h2{
    margin-bottom:25px;
    color:#2563eb;
}

/* ===== INPUT ===== */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #d1d5db;
    transition:0.3s;
}

input:focus{
    border-color:#2563eb;
    outline:none;
    box-shadow:0 0 5px rgba(37,99,235,0.3);
}

/* ===== BUTTON ===== */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#061e51;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1e40af;
}

/* ===== ERROR ===== */
.error{
    color:red;
    margin-top:10px;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="card">

<h2>Admin Login</h2>

<form method="POST">
{% csrf_token %}
<input type="text" name="email" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button>Login</button>
</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</div>

<!-- 🔥 BACK CONTROL SCRIPT -->
<script>
window.history.pushState(null, null, window.location.href);
window.onpopstate = function () {
    window.location.href = "{% url 'landing' %}";
};
</script>
</body>
</html>
