{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>HireSmart Admin</title>

<style>
/* ===== BODY ===== */
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#eaf2ff,#f8fbff);
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:250px;
    height:100vh;
    background:linear-gradient(180deg,#020617,#0f172a);
    color:white;
    position:fixed;
    top:0;
    left:0;
    padding-top:20px;
    box-shadow:5px 0 25px rgba(0,0,0,0.2);
}

/* LOGO */
.sidebar h2{
    text-align:center;
    margin-bottom:35px;
    font-weight:bold;
    font-size:22px;
    letter-spacing:1px;
    color:#60a5fa;
}

/* LINKS */
.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    color:#cbd5f5;
    padding:12px 22px;
    text-decoration:none;
    transition:0.3s;
    position:relative;
    border-left:3px solid transparent;
}

/* HOVER EFFECT */
.sidebar a:hover{
    background:rgba(59,130,246,0.15);
    color:white;
    padding-left:28px;
    border-left:3px solid #3b82f6;
}

/* ACTIVE LINK */
.sidebar a.active{
    background:rgba(59,130,246,0.25);
    color:white;
    border-left:3px solid #3b82f6;
}

/* ICON ANIMATION */
.sidebar a:hover span{
    transform:scale(1.2);
    transition:0.3s;
}

/* MAIN */
.main{
    margin-left:250px;
    padding:30px;
}
.sidebar a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    width:0%;
    height:2px;
    background:#3b82f6;
    transition:0.3s;
}

.sidebar a:hover::after{
    width:100%;
}
.sidebar{
    background:rgba(15,23,42,0.9);
    backdrop-filter:blur(12px);
}

</style>

</head>

<body>

<div class="sidebar">
    <h2> HireSmart</h2>

<a href="{% url 'admin_dashboard' %}" class="{% if request.path == '/admin-dashboard/' %}active{% endif %}">Dashboard</a>

<a href="{% url 'admin_students' %}" class="{% if request.path == '/admin-students/' %}active{% endif %}">Students</a>

<a href="{% url 'admin_hr' %}" class="{% if request.path == '/admin-hr/' %}active{% endif %}">HR</a>

<a href="{% url 'admin_jobs' %}" class="{% if request.path == '/admin-jobs/' %}active{% endif %}">Jobs</a>

<a href="{% url 'admin_logout' %}">Logout</a>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

</body>
<script>
(function () {
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function () {
        window.location.href = "/admin-login/"; 
    };
})();
</script>
</html>
