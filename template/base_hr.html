{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>HireSmart HR</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e5e7eb;
}

.dashboard{
display:flex;
min-height:100vh;
}

/* Sidebar */

.sidebar{
width:230px;
background:#1f2f46;
color:white;
padding:20px;

position:fixed;
left:0;
top:0;
height:100vh;
}

.sidebar h2{
text-align:center;
margin-bottom:20px;
}

/* Profile */

.profile-menu{
text-align:center;
margin-bottom:20px;
background:#2f4058;
padding:12px;
border-radius:8px;
}

.profile-icon{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
margin-bottom:10px;
}

.profile-circle{
width:60px;
height:60px;
border-radius:50%;
background:#ff7a00;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
margin:auto;
margin-bottom:10px;
color:white;
}

.profile-name{
color:white;
font-size:14px;
}

/* Sidebar links */

.sidebar a{
display:block;
background:#2f4058;
padding:12px;
margin-bottom:12px;
color:white;
text-decoration:none;
border-radius:6px;
}

.sidebar a:hover{
background:#3f516d;
}

/* Content */

.main{
margin-left:250px;
padding:40px;
width:100%;
}

</style>

</head>

<body>

<div class="dashboard">

<!-- Sidebar -->

<div class="sidebar">

<h2>HireSmart</h2>


<div class="profile-menu">

<a href="{% url 'hr_profile' %}" style="text-decoration:none;">

{% if hr.photo %}
<img src="{{ hr.photo.url }}" class="profile-icon">
{% else %}
<div class="profile-circle">
{{ hr.email|first|upper }}
</div>
{% endif %}

</a>

<div class="profile-name">

{% if hr.name %}
{{ hr.name }}
{% else %}
{{ hr.email }}
{% endif %}

</div>

</div>

<a href="{% url 'hr_dashboard' %}">Dashboard</a>
<a href="{% url 'view_resumes' %}">View Resumes</a>
<a href="{% url 'shortlisted_students' %}">Shortlisted</a>
<a href="{% url 'view_applicants' %}">Applicants</a>
<a href="{% url 'post_job' %}">Post Job</a>
<a href="{% url 'messages' %}">Messages</a>
<a href="{% url 'logout' %}">Logout</a>

</div>

<!-- Main content -->

<div class="main">

{% block content %}

{% endblock %}

</div>

</div>

</body>
<script>
(function () {
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function () {
        window.location.href = "/hr-login/";  
    };
})();
</script>
</html>
