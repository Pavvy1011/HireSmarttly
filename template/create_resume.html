{% extends 'base_student.html' %}
{% load static %}

{% block content %}

<h2 class="title">Create Resume</h2>

<div class="main-container">

<div class="card">

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<label>Name</label>
<input type="text" name="name" required>

<label>Education</label>
<input type="text" name="education" required>

<label>Technical Skills</label>
<input type="text" name="skills" placeholder="Python, Django, HTML" required>

<label>Soft Skills</label>
<input type="text" name="soft_skills" placeholder="Communication, Teamwork, Leadership">

<label>Experience</label>
<input type="text" name="experience">

<label>Projects</label>
<textarea name="projects" rows="3" placeholder="HireSmart AI Portal, Android App"></textarea>

<label>Upload Photo</label>
<input type="file" name="photo">

<label>Upload Resume (PDF)</label>
<input type="file" name="resume">

<button type="submit">Save Resume</button>

</form>

</div>

</div>

<style>

/* ===== TITLE ===== */
.title{
text-align:center;
margin-bottom:30px;
color:#1e3a8a;
font-size:28px;
}

/* 🔥 CENTER FIX */
.main-container{
display:flex;
justify-content:center;
align-items:center;
width:100%;
}

/* ===== CARD ===== */
.card{
background:white;
padding:30px;
border-radius:16px;
width:500px;
box-shadow:0 15px 35px rgba(0,0,0,0.12);
border-top:4px solid #2563eb;
}

/* ===== INPUT ===== */
input, textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

/* Focus effect */
input:focus, textarea:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 6px rgba(37,99,235,0.3);
}

/* ===== BUTTON ===== */
button{
background:#1f3b73;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#162d57;
}

/* ===== LABEL ===== */
label{
font-weight:600;
font-size:14px;
color:#1e3a8a;
}

</style>

{% endblock %}
