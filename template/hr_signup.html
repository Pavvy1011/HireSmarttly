{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>HR Signup</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>

/* ===== BODY ===== */
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e5e7eb;
}

/* ===== CARD ===== */
.card{
    background:white;
    padding:50px 45px;
    width:400px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,0.18);
}

/* ===== TITLE ===== */
.card h2{
    margin-bottom:30px;
    color:#2563eb;
}

/* ===== INPUT ===== */
.input-group{
    position:relative;
    margin-bottom:22px;
}

.input-group input{
    width:100%;
    padding:14px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

.input-group label{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    background:white;
    padding:0 5px;
    color:#777;
    font-size:13px;
    transition:0.3s;
}

/* floating label fix */
.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
    top:-8px;
    font-size:11px;
    color:#0d2a5e;
}

/* ===== PASSWORD ICON ===== */
.password-wrapper{
    position:relative;
}

.password-wrapper span{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

/* ===== BUTTON ===== */
button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    background:#0d2a5e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* ===== ERROR ===== */
.error{
    color:red;
    margin-top:10px;
}

/* ===== LINKS ===== */
.links{
    margin-top:15px;
}

.links a{
    display:block;
    margin-top:8px;
    color:#2563eb;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="card">

<h2>Create HR Account</h2>

<form method="POST" autocomplete="new-password">
    {% csrf_token %}

    <!-- autofill block -->
    <input type="text" style="display:none">
    <input type="password" style="display:none">

    <!-- NAME -->
    <div class="input-group">
        <input type="text" name="name" placeholder=" " required>
        <label>Full Name</label>
    </div>

    <!-- EMAIL -->
    <div class="input-group">
        <input type="email" name="email" placeholder=" " required autocomplete="new-password">
        <label>Email</label>
    </div>

    <!-- PASSWORD -->
    <div class="input-group password-wrapper">
        <input type="password" id="password" name="password" placeholder=" " required autocomplete="new-password">
        <label>Password</label>
        <span onclick="togglePassword()">👁️</span>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="input-group password-wrapper">
        <input type="password" id="cpassword" name="confirm_password" placeholder=" " required>
        <label>Confirm Password</label>
        <span onclick="toggleConfirm()">👁️</span>
    </div>

    <button type="submit">Create Account</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<div class="links">
    <a href="{% url 'hr_login' %}">Already have account? Login</a>
</div>

</div>

<script>

function togglePassword(){
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function toggleConfirm(){
    const pass = document.getElementById("cpassword");
    pass.type = pass.type === "password" ? "text" : "password";
}

</script>

</body>
</html>
