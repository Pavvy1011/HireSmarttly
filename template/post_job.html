{% extends 'base_hr.html' %}

{% block content %}

<style>

.card{
width:420px;
margin:40px auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.card h2{
text-align:center;
margin-bottom:20px;
color:#2563eb;
}

.card input,
.card textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

.card textarea{
height:100px;
resize:none;
}

.card button{
width:100%;
background:#0d2a5e;
color:white;
padding:10px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.card button:hover{
background:#1e40af;
}

</style>


<div class="card">

<h2>Post Job</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="title" placeholder="Job Title">

<input type="text" name="company" placeholder="Company">

<input type="text" name="skills" placeholder="Required Skills">

<input type="number" name="experience" placeholder="Experience">

<textarea name="description" placeholder="Job Description"></textarea>

<button type="submit">Post Job</button>

</form>

</div>

{% endblock %}
