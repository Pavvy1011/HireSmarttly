<!DOCTYPE html>

<html>

<head>
<title>Job Match Result</title>

<style>

body{
font-family:Arial;
background:#e5e7eb;
text-align:center;
padding:50px;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:400px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.btn{
background:#0d2a5e;
color:white;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
text-decoration:none;
}

.btn:hover{
background:#061e51;
}

</style>

</head>

<body>

<div class="box">

<h2>{{ job.title }}</h2>

<p><b>Company:</b> {{ job.company }}</p>

<p><b>Required Skills:</b> {{ job.skills }}</p>

<h3>Match Percentage: {{ score }}%</h3>

<br>

<a href="{% url 'apply_job' job.id %}" class="btn">
Apply Job
</a>

<br><br>

<a href="{% url 'student_jobs' %}">
Back to Jobs
</a>

</div>

</body>

</html>
