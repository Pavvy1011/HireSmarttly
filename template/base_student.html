{% load static %}
<!DOCTYPE html>
<html>

<head>
<title>HireSmart Student</title>

<style>

/* ===== Body ===== */

body{
margin:0;
font-family:Arial;
background:#e5e7eb;
}

/* ===== Layout ===== */

.main-container{
display:flex;
}

/* ===== Sidebar ===== */

.sidebar{
width:230px;
background:#1f2f46;
height:100vh;
padding:20px;
color:white;
position:fixed;
left:0;
top:0;
}

/* ===== Sidebar Title ===== */

.sidebar h2{
text-align:center;
margin-bottom:20px;
}

/* ===== Profile Block ===== */

.profile-menu{
text-align:center;
margin-bottom:20px;
background:#2f4058;
padding:12px;
border-radius:8px;
}

/* ===== Profile Icon ===== */

.profile-icon{
width:60px;
height:60px;
border-radius:50%;
background:#ff7a00;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
margin:auto;
margin-bottom:10px;
color:white;
}

/* ===== Profile Image ===== */

.profile-img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
margin:auto;
margin-bottom:10px;
display:block;
}

/* ===== Profile Name ===== */

.profile-name{
font-size:14px;
margin-top:5px;
color:white;
}

/* ===== Sidebar Links ===== */

.sidebar a{
display:block;
background:#2f4058;
padding:12px;
margin-bottom:12px;
color:white;
text-decoration:none;
border-radius:6px;
}

.sidebar a:hover{
background:#3f516d;
}

/* ===== Content Area ===== */

.content{
margin-left:250px;
padding:40px;
width:100%;
}

</style>

</head>

<body>

<div class="main-container">

<!-- ===== Sidebar ===== -->

<div class="sidebar">

<h2>HireSmart</h2>

<div class="profile-menu">

<a href="{% url 'student_profile' %}" style="text-decoration:none;color:white;">

{% if student.photo %}
<img src="{{ student.photo.url }}" class="profile-img">
{% else %}
<div class="profile-icon">
{{ student.name|slice:":1" }}
</div>
{% endif %}

<p class="profile-name">{{ student.name }}</p>

</a>

</div>

<a href="{% url 'student_dashboard' %}">Dashboard</a>

<a href="{% url 'create_resume' %}">Create Resume</a>

<a href="{% url 'view_resume' %}">View Resume</a>

<a href="{% url 'edit_resume' %}">Edit Resume</a>

<a href="{% url 'student_jobs' %}">View Jobs</a>
<a href="{% url 'student_messages' %}" class="menu-btn">Messages</a>

<a href="{% url 'student_logout' %}">Logout</a>

</div>

<!-- ===== Page Content ===== -->

<div class="content">

{% block content %}

{% endblock %}

</div>

</div>

</body>
<script>
(function () {
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function () {
        window.location.href = "/student-login/";  
    };
})();
</script>
</html>
