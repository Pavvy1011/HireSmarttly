{% extends 'base_student.html' %}

{% block content %}

<h2 class="title">Edit Resume</h2>


<div class="main-container">

<div class="card">

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<label>Name</label>
<input type="text" name="name" value="{{ resume.name }}" required>

<label>Education</label>
<input type="text" name="education" value="{{ resume.education }}" required>

<label>Technical Skills</label>
<input type="text" name="skills" value="{{ resume.skills }}" required>

<!-- ✅ NEW -->
<label>Soft Skills</label>
<input type="text" name="soft_skills" value="{{ resume.soft_skills }}">

<label>Experience</label>
<input type="text" name="experience" value="{{ resume.experience }}">

<!-- ✅ NEW -->
<label>Projects</label>
<textarea name="projects">{{ resume.projects }}</textarea>

<label>Update Photo</label>
<input type="file" name="photo">

<label>Update Resume (PDF)</label>
<input type="file" name="resume">

<button type="submit">Update Resume</button>

</form>

</div>

</div>

<style>

/* ===== TITLE ===== */
.title{
text-align:center;
margin-bottom:30px;
color:#1e3a8a;
}

/* ===== CENTER FIX ===== */
.main-container{
display:flex;
justify-content:center;
align-items:center;
}

/* ===== CARD ===== */
.card{
background:white;
padding:30px;
border-radius:14px;
width:450px;
box-shadow:0 12px 30px rgba(0,0,0,0.12);
border-top:4px solid #2563eb;
}

/* ===== INPUT ===== */
input, textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

/* Focus effect */
input:focus, textarea:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 5px rgba(37,99,235,0.3);
}

/* ===== BUTTON ===== */
button{
background:#1f3b73;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#162d57;
}

/* ===== LABEL ===== */
label{
font-weight:600;
font-size:14px;
color:#1e3a8a;
}

</style>

{% endblock %}
