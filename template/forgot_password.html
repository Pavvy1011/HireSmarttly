{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>

/* ===== BODY ===== */
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e5e7eb;
}

/* ===== CARD ===== */
.card{
    background:white;
    padding:50px 45px;
    width:380px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,0.18);
    animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(25px);}
    to{opacity:1; transform:translateY(0);}
}

/* ===== TITLE ===== */
.card h2{
    margin-bottom:30px;
    color:#2563eb;
}

/* ===== INPUT ===== */
.input-group{
    position:relative;
    margin-bottom:22px;
}

.input-group input{
    width:100%;
    padding:14px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

/* FLOAT LABEL */
.input-group label{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    background:white;
    padding:0 5px;
    color:#777;
    font-size:13px;
    transition:0.3s;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
    top:-8px;
    font-size:11px;
    color:#0d2a5e;
}

/* ===== BUTTON ===== */
button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    background:#0d2a5e;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

/* ===== ERROR ===== */
.error{
    color:red;
    margin-top:10px;
}

/* ===== LINKS ===== */
.links{
    margin-top:15px;
}

.links a{
    display:block;
    margin-top:8px;
    color:#2563eb;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="card">

<h2>Forgot Password</h2>

<form method="POST">
    {% csrf_token %}

    <div class="input-group">
        <!-- 🔥 MAIN FIX -->
        <input type="email" name="email" placeholder=" " required readonly
               onfocus="this.removeAttribute('readonly');">
        <label>Email</label>
    </div>

    <button type="submit">Send OTP</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<div class="links">
    <a href="{% url 'hr_login' %}">Back to Login</a>
</div>

</div>

</body>
</html>
