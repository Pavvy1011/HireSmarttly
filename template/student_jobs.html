{% extends 'base_student.html' %}

{% block content %}

<h2>Available Jobs</h2>

<!-- AI Job Recommendation Button -->
<a href="{% url 'recommended_jobs' %}" class="ai-btn">
    🤖 AI Job Match
</a>

<style>

.ai-btn{
position:fixed;
right:25px;
bottom:25px;
background:#0d2a5e;
color:white;
padding:14px 18px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.ai-btn:hover{
background:#061e51;
}

/* TABLE */
.jobs-table{
width:85%;
border-collapse:collapse;
background:white;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
margin:auto;
}

.jobs-table th{
background:#0d2a5e;
color:white;
padding:12px;
}

.jobs-table td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

/* BUTTONS */
.apply-btn{
background:#16a34a;
color:white;
border:none;
padding:8px 18px;
border-radius:6px;
cursor:pointer;
}

.apply-btn:hover{
background:#15803d;
}

.match-btn{
background:#0d2a5e;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.match-btn:hover{
background:#071c40;
}

</style>

<table class="jobs-table">

<tr>
<th>ID</th>
<th>Title</th>
<th>Company</th>
<th>Skills</th>
<th>Experience</th>
<th>Match</th>
<th>Apply</th>
</tr>

{% for job in jobs %}

<tr>

<td>{{ job.id }}</td>
<td>{{ job.title }}</td>
<td>{{ job.company }}</td>
<td>{{ job.skills }}</td>
<td>{{ job.experience }}</td>

<td>
<a href="{% url 'check_match' job.id %}">
<button type="button" class="match-btn">Check Match %</button>
</a>
</td>

<td>

<form method="POST" action="{% url 'apply_job' job.id %}" 
      onsubmit="return confirm('Are you sure you want to apply for this job?')">
{% csrf_token %}

<button type="submit" class="apply-btn">
    Apply Job
</button>

</form>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
